<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Desk - Sales Page</title>
    <link rel="icon" href="/assets/images/favicon.png">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/sales.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/d357d72767.js" crossorigin="anonymous"></script>
    <style> .navbar { background: #133e5e; } </style>

</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-inner">
            <div class="nav-logo">
                <a class="nav-link" href="/index.html">
                    <img src="/assets/images/GeminiHelpDeskLogo-Picsart-BackgroundRemover.png" alt="Help Desk Logo" class="nav-logo-img">
                </a>
            </div>
            <div class="nav-links">
                <a href="/pages/about.html" class="nav-link">About</a>
                <a href="/pages/login-page.html" class="nav-btn secondary">Log in</a>
                <a href="/pages/user-registration.html" class="nav-btn primary">Sign up</a>
            </div>
        </div>
    </nav>

    <main>
        <!-- Main Landing Section -->
        <section class="landing">
            <div class="landing-inner">
                <h1 class="landing-title">Get Your Team Started <span class="landing-accent">Today</span></h1>
                <p class="landing-subtitle">The right plan. The right price.<br>No Stress.</p>
            </div>
        </section>

        <!-- Sales Request -->
        <section class="sales" id="sales">
            <div class="sales-inner">
                <h2>Our Sales Advisors are Here to Help</h2>
                <p>Fill out our form and let the best solution come to you!</p>
                <form class="sales-form" id="sales-form">
                    <div class="sales-row">
                        <input type="text" placeholder="First Name" required class="sales-input">
                        <input type="text" placeholder="Last Name" required class="sales-input">
                        <input type="email" placeholder="Work Email" required class="sales-input">
                        <input type="text" placeholder="Company Name" required class="sales-input">
                        <input type="text" placeholder="What is the size of your company?" required class="sales-input full">
                        <button type="submit" class="sales-btn">Get Started<i class="fa-solid fa-arrow-right"></i></button>
                        <p id="sales-success" style="display: none; color: #22c55e; text-align: center; margin-top: 1rem;">
                            <i class="fa-solid fa-circle-check"></i> Thank you! We will be reaching out soon!
                        </p>
                    </div>
                </form>
            </div>
        </section>

         <!-- CTA Section -->
        <section class="cta">
            <div class="cta-inner">
                <h2>Have Questions?</h2>
                <p>We're here to help.</p>
                <div class="cta-btns">
                    <a href="/pages/about.html" class="cta-btn primary">About HelpDesk</a>
                    <a href="/pages/faq.html" class="cta-btn secondary">View FAQ <i class="fa-solid fa-arrow-right"></i></a>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer Component Insertion -->
    <div id="footer"></div>

    <script type="module" src="/js/footer.js"></script>

</body>
</html>
