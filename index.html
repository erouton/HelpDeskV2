<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Desk - Home Page</title>
    <link rel="icon" href="/assets/images/favicon.png">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/home.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/d357d72767.js" crossorigin="anonymous"></script>
    <style> .navbar { background: #133e5e; } </style>

</head>
<body>

    <!-- Navbar -->
     <nav class="navbar">
        <div class="navbar-inner">
            <div class="nav-logo">
                <img src="/assets/images/GeminiHelpDeskLogo-Picsart-BackgroundRemover.png" alt="Help Desk Logo" class="nav-logo-img">
            </div>
            <div class="nav-links">
                <a href="/pages/faq.html" class="nav-link">FAQ</a>
                <a href="/pages/login-page.html" class="nav-btn secondary">Log in</a>
                <a href="/pages/user-registration.html" class="nav-btn primary">Sign up</a>
            </div>
        </div>
    </nav>

    <main>
        <!-- Main Landing Section -->
        <section class="landing">
            <div class="landing-inner">
                <h1 class="landing-title">Needing Some <span class="landing-accent">Help?</span></h1>
                <p class="landing-subtitle">Just a simple question? Ask our FAQ. If it's more complex, talk to an agent today!</p>
                <div class="landing-btns">
                    <a href="/pages/user-registration.html" class="landing-btn primary">Get Started</a>
                    <a href="/pages/faq.html" class="landing-btn secondary">View FAQ <i class="fa-solid fa-arrow-right"></i></a>
                </div>
            </div>
        </section>

        <!-- CTA Section -->
        <section class="cta">
            <div class="cta-inner">
                <h2>Ready to get started?</h2>
                <p>Join your team on Help Desk today.</p>
                <div class="cta-btns">
                    <a href="/pages/sales.html" class="cta-btn primary">Contact Sales</a>
                    <a href="/pages/faq.html" class="cta-btn secondary">View FAQ <i class="fa-solid fa-arrow-right"></i></a>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer Component Insertion -->
    <div id="footer"></div>

    <script type="module" src="/js/footer.js"></script>

</body>
</html>
